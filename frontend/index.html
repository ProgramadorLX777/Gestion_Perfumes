<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Perfumes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>📦 Pedidos de Perfumes</h2>

    <form id="formPedido">

        <!-- 🔥 NUEVO: tipo -->
        <select id="tipo" required>
            <option value="">Seleccione género:</option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
        </select>

        <!-- 🔥 ahora es select -->
        <select id="codigo" required>
            <option value="">Seleccione perfume:</option>
        </select>

        <input type="text" id="nombre" placeholder="Nombre perfume" readonly>
        <input type="text" id="disenador" placeholder="Diseñador (Marca perfume)" readonly>
        <select id="ml" required>
            <option value="">Seleccione tamaño:</option>
            <option value="50">50 ml</option>
            <option value="100">100 ml</option>
        </select>
        <input type="text" id="cliente" placeholder="Nombre cliente" required>

        <button type="submit" class="btn-guardar">Guardar fragancia</button>
    </form>

    <div id="mensaje"></div>

    <hr>

    <h3>Lista de pedidos</h3>
    <ul id="listaPedidos"></ul>

    <script type="module" src="app.js"></script>
</body>

</html>
