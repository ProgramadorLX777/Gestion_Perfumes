<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos de Perfumes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>📦 Pedidos de Perfumes</h2>

    <form id="formPedido">
        <input type="text" id="codigo" placeholder="Código" required>
        <input type="text" id="nombre" placeholder="Nombre perfume" required>
        <input type="text" id="disenador" placeholder="Diseñador" required>
        <input type="number" id="ml" placeholder="ML" required>
        <input type="text" id="cliente" placeholder="Cliente" required>
        <button type="submit">Guardar</button>
    </form>

    <hr>

    <h3>Lista de pedidos</h3>
    <ul id="listaPedidos"></ul>

    <script type="module" src="app.js"></script>
</body>

</html>
